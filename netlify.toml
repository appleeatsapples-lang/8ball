[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/lab/*"
  to = "/lab/:splat"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(self), gyroscope=(self)"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

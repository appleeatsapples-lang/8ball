[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "accelerometer=(), gyroscope=()"

# assets/cities.json is 2.3MB and static per release; without a rule Netlify
# serves it max-age=0 must-revalidate. Long immutable cache is the headers-only
# half of audit M7 — the versioned/sharded asset work stays K1-gated.
[[headers]]
  for = "/assets/cities.json"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

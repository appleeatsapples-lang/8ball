name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Run tests
        run: npm test
      - name: Verify single-file rule
        run: |
          lines=$(wc -l < index.html)
          echo "index.html: $lines lines"
          if [ "$lines" -gt 1500 ]; then
            echo "::error::index.html exceeds 1500 lines (DOCTRINE.md §6). Split into ui/ modules."
            exit 1
          fi
      - name: Doctrine/content changes require journal entry + audit artifact
        if: github.event_name == 'pull_request'
        run: |
          BASE="origin/${{ github.event.pull_request.base.ref }}"
          git fetch --no-tags --prune origin "${{ github.event.pull_request.base.ref }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          echo "Changed files in PR:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(DOCTRINE\.md|content/[^/]+\.js)$'; then
            if ! echo "$CHANGED" | grep -qE '^journal\.md$'; then
              echo "::error::PR touches DOCTRINE.md or content/*.js without touching journal.md (DOCTRINE.md §8)."
              exit 1
            fi
          fi
          echo "journal-touch gate: pass"
          if echo "$CHANGED" | grep -qE '^DOCTRINE\.md$'; then
            if ! echo "$CHANGED" | grep -qE '^audits/'; then
              echo "::error::PR touches DOCTRINE.md without a corresponding audit artifact under audits/ (DOCTRINE.md §8 gate 6 / §10 cross-model audit)."
              exit 1
            fi
          fi
          echo "audit-artifact gate: pass"
      - name: L48 gate — claude/* PRs require an in-PR audit artifact
        if: github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'claude/')
        run: |
          BASE="origin/${{ github.event.pull_request.base.ref }}"
          git fetch --no-tags --prune origin "${{ github.event.pull_request.base.ref }}"
          CHANGED=$(git diff --name-only "$BASE"...HEAD)
          if ! echo "$CHANGED" | grep -qvE '\.md$' \
             && ! echo "$CHANGED" | grep -qE '^(audits/RELEASE_CHECKLIST\.md|agents/.*\.md)$'; then
            echo "L48 gate: docs-only PR (no behavior, no governance-gate docs) — exempt"
            exit 0
          fi
          PR='${{ github.event.pull_request.number }}'
          if echo "$CHANGED" | grep -qE "^audits/[^/]*pr${PR}[^0-9][^/]*\.md$"; then
            echo "L48 gate: audit artifact naming pr${PR} present — pass"
          else
            echo "::error::claude/* PR without an in-PR audit artifact (L48). Commit the cross-model verdict response as audits/<model>_pr${PR}_premerge_audit_<date>_response.md, or an explicit override as audits/L48_override_pr${PR}_<date>.md — the override file IS the L48 sighting log."
            exit 1
          fi
